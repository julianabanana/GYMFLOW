name: CI

# Se dispara en cada push y cada PR — ver spec/constitution/ci-cd.md para
# el alcance decidido: tests + build + smoke test en contenedores, sin
# despliegue automático (eso queda fuera de este pipeline por ahora).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymflow
          POSTGRES_PASSWORD: gymflow
          POSTGRES_DB: gymflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gymflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://gymflow:gymflow@localhost:5432/gymflow
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar Pipenv
        run: pip install pipenv

      - name: Instalar dependencias (incluye dev)
        run: pipenv install --skip-lock --dev

      - name: Aplicar migraciones
        run: pipenv run alembic upgrade head

      - name: Correr tests
        run: pipenv run pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Preparar .env para el smoke test
        run: cp .env.example .env

      - name: Levantar el stack completo
        run: docker compose up --build -d

      - name: Esperar a que backend y frontend estén healthy
        run: |
          for i in $(seq 1 30); do
            backend_status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q backend) 2>/dev/null || echo "starting")
            if [ "$backend_status" = "healthy" ]; then
              echo "Backend healthy."
              break
            fi
            echo "Esperando backend... ($i/30)"
            sleep 2
          done
          if [ "$backend_status" != "healthy" ]; then
            echo "Backend no quedó healthy a tiempo."
            docker compose logs
            exit 1
          fi

      - name: Verificar que el frontend responde
        run: curl -sf http://localhost:5173/ > /dev/null

      - name: Logs (si algo falló arriba, quedan visibles antes de terminar)
        if: always()
        run: docker compose logs

      - name: Apagar el stack
        if: always()
        run: docker compose down -v
