server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real cae a index.html
    # (React Router maneja el resto en el cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend dentro de la red de docker compose — evita CORS
    # en el stack "de producción" (dev usa el proxy propio de Vite).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket del kiosko (012-checkin-qr-dinamico) — necesita headers
    # de Upgrade/Connection que /api/ no maneja por defecto.
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
